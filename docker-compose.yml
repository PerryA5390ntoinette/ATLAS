version: '3.8'

services:
  # Main ATLAS application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: atlas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-atlas}
      POSTGRES_USER: ${DB_USER:-atlas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - atlas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atlas_user} -d ${DB_NAME:-atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: atlas_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - atlas_network
    healthcheck:
      # note: using --no-auth-warning to suppress warning in logs
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: atlas_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/var/www/static:ro
    depends_on:
      - app
    networks:
      - atlas_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  atlas_network:
    driver: bridge
